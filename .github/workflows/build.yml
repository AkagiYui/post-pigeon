name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: '构建版本号（可选）'
        required: false
        default: ''

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: post-pigeon-macos
          - os: windows-latest
            artifact: post-pigeon-windows
          - os: ubuntu-latest
            artifact: post-pigeon-linux
    
    name: 构建 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: 'go.mod'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: 'frontend/package.json'
          cache: true
          cache_dependency_path: 'frontend/pnpm-lock.yaml'

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'frontend/package.json'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: 安装 Linux 依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: 安装 NSIS (Windows)
        if: runner.os == 'Windows'
        uses: repolevedavaj/install-nsis@v1.1.0
        with:
          nsis-version: '3.12'

      - name: 安装 Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          wails3 doctor

      - name: 构建应用
        run: wails3 package

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: bin/
