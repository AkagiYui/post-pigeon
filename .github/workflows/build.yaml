name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  # 检查 commits，决定是否需要构建
  check-commits:
    name: 检查 commits
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    
    steps:
      - name: 检查是否需要构建
        id: check
        run: |
          # 获取所有 commit messages
          COMMITS='${{ toJson(github.event.commits) }}'
          
          # 检查是否有任何 commit 不以 docs 或 style 开头
          SHOULD_BUILD="false"
          
          for message in $(echo "$COMMITS" | jq -r '.[].message'); do
            if [[ ! "$message" =~ ^(docs|style) ]]; then
              SHOULD_BUILD="true"
              echo "发现功能性 commit: $message"
              break
            fi
          done
          
          echo "should-build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "是否需要构建: $SHOULD_BUILD"

  build:
    needs: check-commits
    # 只要有任意一个功能性 commit 就触发构建
    if: needs.check-commits.outputs.should-build == 'true'
    # 构建任务
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            artifact: post-pigeon-macos-arm64
          - os: windows-latest
            arch: x64
            artifact: post-pigeon-windows-x64
    
    name: 构建 ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    # 使用 bash 作为默认 shell（Windows 会使用 Git Bash）
    defaults:
      run:
        shell: bash
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: 'go.mod'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: 'frontend/package.json'
          cache: true
          cache_dependency_path: 'frontend/pnpm-lock.yaml'

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'frontend/package.json'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: 安装 Linux 依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: 安装 NSIS (Windows)
        if: runner.os == 'Windows'
        uses: AkagiYui/install-nsis@v1.1.2
        with:
          nsis-version: '3.12'

      - name: 安装 Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: 更新构建资源
        run: wails3 task common:update:build-assets

      - name: 构建应用
        run: wails3 package

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: bin/
